<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPulse — أخبار وقاعدة بيانات الألعاب</title>
    <!-- Tailwind CSS للتحكم في التصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #22d3ee; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased font-sans">

    <!-- شريط التنقل العلوي (Navbar) -->
    <header className="sticky top-0 z-50 border-b border-zinc-800 bg-zinc-950/95 backdrop-blur">
        <nav class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <div class="text-xl font-extrabold tracking-tight">
                PIXEL<span class="text-cyan-400">PULSE</span>
            </div>
            
            <!-- قائمة البحث -->
            <div class="relative w-48 sm:w-64">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="ابحث عن لعبة..." 
                    class="w-full rounded-full border border-zinc-700 bg-zinc-900 px-4 py-1.5 text-sm text-white outline-none transition-all focus:border-cyan-400 text-right"
                >
            </div>
        </nav>
    </header>

    <!-- المحتوى الرئيسي للموقع -->
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8 space-y-12">
        
        <!-- القسم الرئيسي: خبر عاجل مميز -->
        <section id="heroSection" class="relative block overflow-hidden rounded-2xl bg-zinc-900 aspect-[16/7] w-full">
            <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/50 to-transparent z-10"></div>
            <div class="absolute bottom-0 p-6 sm:p-10 z-20 text-right w-full">
                <span class="mb-3 inline-block rounded bg-red-600 px-2.5 py-1 text-xs font-bold uppercase tracking-wider text-white">خبر عاجل</span>
                <h1 class="max-w-3xl text-2xl font-extrabold leading-tight text-white sm:text-4xl">مراجعة لعبة Starfall Odyssey: معيار جديد لألعاب الخيال العلمي</h1>
                <p class="mt-2 hidden max-w-2xl text-zinc-300 sm:block">تجربة مذهلة تأخذك في رحلة عبر النجوم مع خيارات مصيرية تغير مجرى القصة بالكامل.</p>
            </div>
        </section>

        <!-- قسم الألعاب الأكثر شيوعاً (Trending Games) -->
        <section>
            <h2 class="mb-6 border-r-4 border-pink-500 pr-3 text-2xl font-bold text-white text-right">الألعاب الأكثر شيوعاً وتداولاً</h2>
            <div id="trendingGrid" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
                <!-- سيتم توليد البطاقات تلقائياً هنا عبر الجافا سكريبت -->
                <div class="animate-pulse bg-zinc-900 h-48 rounded-xl"></div>
                <div class="animate-pulse bg-zinc-900 h-48 rounded-xl"></div>
                <div class="animate-pulse bg-zinc-900 h-48 rounded-xl"></div>
                <div class="animate-pulse bg-zinc-900 h-48 rounded-xl"></div>
            </div>
        </section>

    </main>

    <!-- الفوتر (Footer) -->
    <footer class="mt-16 border-t border-zinc-800 bg-zinc-900/50">
        <div class="mx-auto max-w-7xl px-4 py-8 text-center text-sm text-zinc-500">
            © 2026 PixelPulse. جميع الحقوق محفوظة. البيانات مدعومة بواسطة RAWG API.
        </div>
    </footer>

    <!-- كود التشغيل وجلب البيانات (JavaScript) -->
    <script>
        // بيانات تجريبية للألعاب في حال عدم توفر كود الـ API الخاص بـ RAWG
        const fallbackGames = [
            { name: "Starfall Odyssey", released: "2026-06-18", background_image: "https://placehold.co/600x400/18181b/22d3ee?text=Starfall+Odyssey", metacritic: 92, genres: [{name: "RPG"}] },
            { name: "Neon Drift 2", released: "2026-07-02", background_image: "https://placehold.co/600x400/18181b/f472b6?text=Neon+Drift+2", metacritic: 84, genres: [{name: "Racing"}] },
            { name: "Iron Vanguard", released: "2026-05-30", background_image: "https://placehold.co/600x400/18181b/a78bfa?text=Iron+Vanguard", metacritic: 78, genres: [{name: "Shooter"}] },
            { name: "Mystic Hollow", released: "2026-06-25", background_image: "https://placehold.co/600x400/18181b/34d399?text=Mystic+Hollow", metacritic: 95, genres: [{name: "Adventure"}] }
        ];

        // دالة لعرض الألعاب داخل الصفحة
        function displayGames(games) {
            const grid = document.getElementById('trendingGrid');
            grid.innerHTML = ''; // تنظيف شاشة التحميل

            games.forEach(game => {
                const scoreColor = game.metacritic >= 75 ? 'bg-green-600' : (game.metacritic >= 50 ? 'bg-yellow-600' : 'bg-zinc-600');
                const genreBadges = game.genres ? game.genres.slice(0, 2).map(g => `<span class="rounded-full bg-zinc-800 px-2 py-0.5 text-xs text-zinc-300">${g.name}</span>`).join('') : '';

                const card = `
                    <div class="group overflow-hidden rounded-xl border border-zinc-800 bg-zinc-900 transition-all hover:-translate-y-1 hover:border-pink-500/50 hover:shadow-lg hover:shadow-pink-500/10 text-right">
                        <div class="relative aspect-video w-full bg-zinc-800 block overflow-hidden">
                            <img src="${game.background_image}" alt="${game.name}" class="object-cover w-full h-full transition-transform duration-300 group-hover:scale-105">
                            ${game.metacritic ? `<span class="absolute left-3 top-3 rounded px-2 py-1 text-xs font-bold text-white ${scoreColor}">${game.metacritic}</span>` : ''}
                        </div>
                        <div class="p-4">
                            <h3 class="line-clamp-1 font-bold text-white transition-colors group-hover:text-pink-400">${game.name}</h3>
                            <p class="mt-1 text-xs text-zinc-400">${game.released}</p>
                            <div class="mt-3 flex flex-row-reverse flex-wrap gap-1.5">
                                ${genreBadges}
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // جلب البيانات من RAWG API تلقائياً
        async function fetchTrendingGames() {
            // ضع مفتاح الـ API الخاص بك هنا إذا كان لديك واحد، مثل: 'YOUR_API_KEY'
            const apiKey = ''; 
            
            if (!apiKey) {
                // إذا لم يضف المستخدم مفتاح API، سنعرض البيانات التجريبية مباشرة
                displayGames(fallbackGames);
                return;
            }

            try {
                const response = await fetch(`https://api.rawg.io/api/games?key=${apiKey}&ordering=-added&page_size=4`);
                if (response.ok) {
                    const data = await response.json();
                    displayGames(data.results);
                } else {
                    displayGames(fallbackGames);
                }
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
                displayGames(fallbackGames);
            }
        }

        // تشغيل الجلب عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', fetchTrendingGames);
    </script>
</body>
</html>
